app:
  name: go_web
  env: development

server:
  host: 0.0.0.0
  port: 8080
  mode: debug

postgres:
  host: localhost
  port: 5432
  user: go_web
  password: your_postgres_password
  database: go_web
  ssl_mode: disable
  timezone: Asia/Shanghai
  max_open_conns: 20
  max_idle_conns: 10

redis:
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  issuer: go_web
  secret: your-jwt-secret
  access_token_ttl: 2h

log:
  level: info
  encoding: console

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Authorization
    - Content-Type
    - X-Request-ID

swagger:
  enabled: true

upload:
  dir: ./uploads
  max_size: 5242880
  allowed_exts:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp

seed:
  enabled: true
  admin_username: admin
  admin_email: admin@example.com
  admin_password: your_admin_password
